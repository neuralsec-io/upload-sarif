name: Code Quality

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          args: --timeout=10m
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go run gotest.tools/gotestsum@latest --junitfile unit-tests.xml --format pkgname -- -tags test -coverpkg=./... -coverprofile=cover.out ./...
      - uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5  # v2.4.0
        with:
          paths: "unit-tests.xml"
        if: always()
