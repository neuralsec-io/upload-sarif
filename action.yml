name: "Upload SARIF"
description: "Upload SARIF files to Neuralsec API for security analysis"
author: "Neuralsec"

branding:
  icon: "shield"
  color: "blue"

inputs:
  api-key:
    description: "API key for authentication with Neuralsec API"
    required: true
  path:
    description: "Path to SARIF file or directory containing SARIF files"
    required: true
  version:
    description: "Version of the upload-sarif CLI to use (e.g., v1.0.0). Defaults to latest."
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Determine CLI version
      id: version
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          VERSION=$(curl -s https://api.github.com/repos/${{ github.action_repository }}/releases/latest | jq -r '.tag_name')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest version"
            exit 1
          fi
        else
          VERSION="${{ inputs.version }}"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Determine platform
      id: platform
      shell: bash
      run: |
        OS=$(uname -s)
        ARCH=$(uname -m)
        
        case "$OS" in
          Linux)
            OS_NAME="Linux"
            ;;
          Darwin)
            OS_NAME="Darwin"
            ;;
          MINGW*|MSYS*|CYGWIN*)
            OS_NAME="Windows"
            ;;
          *)
            echo "::error::Unsupported operating system: $OS"
            exit 1
            ;;
        esac
        
        case "$ARCH" in
          x86_64|amd64)
            ARCH_NAME="x86_64"
            ;;
          arm64|aarch64)
            ARCH_NAME="arm64"
            ;;
          i386|i686)
            ARCH_NAME="i386"
            ;;
          *)
            echo "::error::Unsupported architecture: $ARCH"
            exit 1
            ;;
        esac
        
        echo "os=$OS_NAME" >> "$GITHUB_OUTPUT"
        echo "arch=$ARCH_NAME" >> "$GITHUB_OUTPUT"

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Download CLI and verification files
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        OS="${{ steps.platform.outputs.os }}"
        ARCH="${{ steps.platform.outputs.arch }}"
        BASE_URL="https://github.com/${{ github.action_repository }}/releases/download/${VERSION}"
        
        if [ "$OS" = "Windows" ]; then
          ARCHIVE_NAME="upload-sarif_${OS}_${ARCH}.zip"
        else
          ARCHIVE_NAME="upload-sarif_${OS}_${ARCH}.tar.gz"
        fi
        
        echo "Downloading upload-sarif ${VERSION} for ${OS}/${ARCH}..."
        
        # Download archive
        curl -sL -o "/tmp/${ARCHIVE_NAME}" "${BASE_URL}/${ARCHIVE_NAME}"
        
        # Download checksums and sigstore bundle
        curl -sL -o "/tmp/checksums.txt" "${BASE_URL}/checksums.txt"
        curl -sL -o "/tmp/checksums.txt.sigstore.json" "${BASE_URL}/checksums.txt.sigstore.json"
        
        echo "Downloaded all files successfully"

    - name: Verify signature
      shell: bash
      run: |
        echo "Verifying checksums.txt signature with Cosign..."
        cosign verify-blob \
          --bundle /tmp/checksums.txt.sigstore.json \
          /tmp/checksums.txt
        echo "Signature verification successful"

    - name: Verify checksum
      shell: bash
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        OS="${{ steps.platform.outputs.os }}"
        ARCH="${{ steps.platform.outputs.arch }}"
        
        if [ "$OS" = "Windows" ]; then
          ARCHIVE_NAME="upload-sarif_${OS}_${ARCH}.zip"
        else
          ARCHIVE_NAME="upload-sarif_${OS}_${ARCH}.tar.gz"
        fi
        
        echo "Verifying checksum for ${ARCHIVE_NAME}..."
        
        # Extract expected checksum
        EXPECTED=$(grep "${ARCHIVE_NAME}" /tmp/checksums.txt | awk '{print $1}')
        if [ -z "$EXPECTED" ]; then
          echo "::error::Archive not found in checksums.txt"
          exit 1
        fi
        
        # Calculate actual checksum
        ACTUAL=$(sha256sum "/tmp/${ARCHIVE_NAME}" | awk '{print $1}')
        
        if [ "$EXPECTED" != "$ACTUAL" ]; then
          echo "::error::Checksum mismatch! Expected: ${EXPECTED}, Got: ${ACTUAL}"
          exit 1
        fi
        
        echo "Checksum verification successful"

    - name: Extract CLI
      shell: bash
      run: |
        OS="${{ steps.platform.outputs.os }}"
        ARCH="${{ steps.platform.outputs.arch }}"
        
        if [ "$OS" = "Windows" ]; then
          ARCHIVE_NAME="upload-sarif_${OS}_${ARCH}.zip"
          unzip -q "/tmp/${ARCHIVE_NAME}" -d /tmp/upload-sarif
        else
          ARCHIVE_NAME="upload-sarif_${OS}_${ARCH}.tar.gz"
          mkdir -p /tmp/upload-sarif
          tar -xzf "/tmp/${ARCHIVE_NAME}" -C /tmp/upload-sarif
        fi
        
        chmod +x /tmp/upload-sarif/upload-sarif
        echo "CLI extracted successfully"

    - name: Mask API key
      shell: bash
      run: echo "::add-mask::${{ inputs.api-key }}"

    - name: Upload SARIF
      shell: bash
      env:
        API_KEY: ${{ inputs.api-key }}
        GITHUB_REPO_OWNER: ${{ github.repository_owner }}
        GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        REVISION: ${{ github.sha }}
      run: |
        /tmp/upload-sarif/upload-sarif --path "${{ inputs.path }}"
